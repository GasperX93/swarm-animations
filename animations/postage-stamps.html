<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postage Stamps – Ethswarm</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #272727; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow: hidden; }
canvas { max-width: 1280px; width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<canvas id="c" width="1280" height="680"></canvas>
<script>
// ── Constants ──
const W = 1280, H = 680;
const BG = '#272727', ORANGE = '#d4633a', WHITE = '#ffffff', DARK = '#191919';
const NODE_R = 44, INNER_R = 32, STROKE_W = 3, LINE_W = 1.5;
const FONT = 'bold 17px Arial, sans-serif';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Seeded RNG ──
let seed = 42;
function rng() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
function rngHex(n) { let s = ''; for (let i = 0; i < n; i++) s += '0123456789abcdef'[Math.floor(rng()*16)]; return s; }

// ── Geometry helpers ──
function ptLen(a, b) { const dx = b[0]-a[0], dy = b[1]-a[1]; return Math.sqrt(dx*dx+dy*dy); }
function pathLen(pts) { let s=0; for(let i=1;i<pts.length;i++) s+=ptLen(pts[i-1],pts[i]); return s; }
function posAt(pts, d) {
    let rem = d;
    for (let i=1; i<pts.length; i++) {
        const seg = ptLen(pts[i-1], pts[i]);
        if (rem <= seg) {
            const t = rem / seg;
            return [pts[i-1][0]+(pts[i][0]-pts[i-1][0])*t, pts[i-1][1]+(pts[i][1]-pts[i-1][1])*t];
        }
        rem -= seg;
    }
    return pts[pts.length-1];
}

// ── Drawing primitives ──
function ln(x1,y1,x2,y2,color,width) {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle = color || WHITE; ctx.lineWidth = width || LINE_W; ctx.stroke();
}

function shell(x,y,r,ir) {
    r = r || NODE_R; ir = ir || INNER_R;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = ORANGE; ctx.fill();
    ctx.strokeStyle = WHITE; ctx.lineWidth = STROKE_W; ctx.stroke();
    ctx.beginPath(); ctx.arc(x,y,ir,0,Math.PI*2);
    ctx.fillStyle = DARK; ctx.fill();
}

function renderText(text,x,y,color,font,align,baseline) {
    ctx.fillStyle = color || WHITE;
    ctx.font = font || FONT;
    ctx.textAlign = align || 'center';
    ctx.textBaseline = baseline || 'top';
    ctx.fillText(text,x,y);
}

// ── Icon functions ──
function iconImage(x, y, scale) {
    const s = scale || 1;
    ctx.strokeStyle = WHITE; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(x - 14*s, y - 12*s, 28*s, 24*s);
    ctx.stroke();
    // Mountain
    ctx.beginPath();
    ctx.moveTo(x - 10*s, y + 8*s);
    ctx.lineTo(x - 3*s, y - 2*s);
    ctx.lineTo(x + 2*s, y + 3*s);
    ctx.lineTo(x + 7*s, y - 1*s);
    ctx.lineTo(x + 10*s, y + 8*s);
    ctx.strokeStyle = WHITE; ctx.lineWidth = 1.5;
    ctx.stroke();
    // Sun
    ctx.beginPath();
    ctx.arc(x + 6*s, y - 5*s, 3*s, 0, Math.PI*2);
    ctx.strokeStyle = WHITE; ctx.lineWidth = 1.5;
    ctx.stroke();
}

function iconHexDouble(x, y) {
    ctx.strokeStyle = WHITE; ctx.lineWidth = 2;
    function hex(cx, cy, r) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const a = Math.PI / 3 * i - Math.PI / 6;
            const px = cx + r * Math.cos(a), py = cy + r * Math.sin(a);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
    }
    hex(x, y, 14);
    hex(x, y, 9);
}

function iconChunk(x, y) {
    ctx.strokeStyle = WHITE; ctx.lineWidth = 2;
    const w = 18, h = 22, fold = 6;
    ctx.beginPath();
    ctx.moveTo(x - w/2, y - h/2);
    ctx.lineTo(x + w/2 - fold, y - h/2);
    ctx.lineTo(x + w/2, y - h/2 + fold);
    ctx.lineTo(x + w/2, y + h/2);
    ctx.lineTo(x - w/2, y + h/2);
    ctx.closePath();
    ctx.stroke();
    // Fold line
    ctx.beginPath();
    ctx.moveTo(x + w/2 - fold, y - h/2);
    ctx.lineTo(x + w/2 - fold, y - h/2 + fold);
    ctx.lineTo(x + w/2, y - h/2 + fold);
    ctx.stroke();
}

function iconStamp(x, y, scale) {
    const s = scale || 1;
    ctx.strokeStyle = WHITE; ctx.lineWidth = 2;
    const w = 20 * s, h = 16 * s;
    // Outer rectangle with serrated edge (stamp perforations)
    ctx.beginPath();
    ctx.rect(x - w/2, y - h/2, w, h);
    ctx.stroke();
    // Inner diamond pattern (proof of payment)
    ctx.strokeStyle = ORANGE; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y - 4*s);
    ctx.lineTo(x + 5*s, y);
    ctx.lineTo(x, y + 4*s);
    ctx.lineTo(x - 5*s, y);
    ctx.closePath();
    ctx.stroke();
    // Small dot in center
    ctx.beginPath();
    ctx.arc(x, y, 1.5*s, 0, Math.PI*2);
    ctx.fillStyle = ORANGE; ctx.fill();
}

function iconStampFilled(x, y, scale) {
    const s = scale || 1;
    const w = 20 * s, h = 16 * s;
    // Background fill
    ctx.fillStyle = ORANGE;
    ctx.fillRect(x - w/2, y - h/2, w, h);
    // Border
    ctx.strokeStyle = WHITE; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(x - w/2, y - h/2, w, h);
    ctx.stroke();
    // Inner diamond
    ctx.fillStyle = DARK;
    ctx.beginPath();
    ctx.moveTo(x, y - 4*s);
    ctx.lineTo(x + 5*s, y);
    ctx.lineTo(x, y + 4*s);
    ctx.lineTo(x - 5*s, y);
    ctx.closePath();
    ctx.fill();
    // Center dot
    ctx.beginPath();
    ctx.arc(x, y, 1.5*s, 0, Math.PI*2);
    ctx.fillStyle = WHITE; ctx.fill();
}

// ── Easing helpers ──
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ── Animation state ──
const NUM_CHUNKS = 5;
const PHASE_DURATIONS = {
    fileAppear: 1.2,
    fileSplit: 1.6,
    chunksSettle: 0.7,
    stampBatchAppear: 1.0,
    stampAttach: 0.9,       // per chunk
    stampAttachGap: 0.2,    // gap between stamps
    chunksTravel: 2.2,
    hold: 1.5,
    fadeOut: 1.0,
    pause: 0.5
};

let phaseTime = 0;
let currentPhase = 'fileAppear';
let chunkHashes = [];
let stampIndex = 0;
let chunkStamped = [];
let chunkTravelProgress = [];
let chunkTargetNode = [];
let globalAlpha = 1;

function resetCycle() {
    seed = 42;
    phaseTime = 0;
    currentPhase = 'fileAppear';
    chunkHashes = [];
    for (let i = 0; i < NUM_CHUNKS; i++) chunkHashes.push(rngHex(8));
    stampIndex = 0;
    chunkStamped = new Array(NUM_CHUNKS).fill(false);
    chunkTravelProgress = new Array(NUM_CHUNKS).fill(0);
    chunkTargetNode = [];
    for (let i = 0; i < NUM_CHUNKS; i++) chunkTargetNode.push(i % storageNodes.length);
    globalAlpha = 1;
}

// ── Node positions ──
const filePos = { x: 130, y: 320 };

const chunkOriginX = 130;
const chunkTargetX = 370;
const chunkStartY = 210;
const chunkSpacing = 60;

function chunkPos(i) {
    return { x: chunkTargetX, y: chunkStartY + i * chunkSpacing };
}

const stampAreaX = 540;
const stampBatchBox = { x: 480, y: 80, w: 180, h: 75 };

function stampedChunkPos(i) {
    return { x: stampAreaX, y: chunkStartY + i * chunkSpacing };
}

const storageNodes = [
    { x: 1020, y: 170, label: 'Node A' },
    { x: 1020, y: 320, label: 'Node B' },
    { x: 1020, y: 470, label: 'Node C' },
    { x: 1140, y: 245, label: 'Node D' }
];

// Initialize
resetCycle();

// ── Scene logic ──
function totalStampTime() {
    return NUM_CHUNKS * PHASE_DURATIONS.stampAttach + (NUM_CHUNKS - 1) * PHASE_DURATIONS.stampAttachGap;
}

function updatePhase(dt) {
    phaseTime += dt;

    switch (currentPhase) {
        case 'fileAppear':
            if (phaseTime >= PHASE_DURATIONS.fileAppear) { phaseTime = 0; currentPhase = 'fileSplit'; }
            break;
        case 'fileSplit':
            if (phaseTime >= PHASE_DURATIONS.fileSplit) { phaseTime = 0; currentPhase = 'chunksSettle'; }
            break;
        case 'chunksSettle':
            if (phaseTime >= PHASE_DURATIONS.chunksSettle) { phaseTime = 0; currentPhase = 'stampBatchAppear'; }
            break;
        case 'stampBatchAppear':
            if (phaseTime >= PHASE_DURATIONS.stampBatchAppear) { phaseTime = 0; currentPhase = 'stampAttach'; stampIndex = 0; }
            break;
        case 'stampAttach': {
            const perChunk = PHASE_DURATIONS.stampAttach + PHASE_DURATIONS.stampAttachGap;
            const idx = Math.floor(phaseTime / perChunk);
            if (idx < NUM_CHUNKS) {
                stampIndex = idx;
                const localT = (phaseTime - idx * perChunk) / PHASE_DURATIONS.stampAttach;
                if (localT >= 1) chunkStamped[idx] = true;
            }
            if (phaseTime >= totalStampTime()) {
                for (let i = 0; i < NUM_CHUNKS; i++) chunkStamped[i] = true;
                phaseTime = 0; currentPhase = 'chunksTravel';
            }
            break;
        }
        case 'chunksTravel':
            for (let i = 0; i < NUM_CHUNKS; i++) {
                const delay = i * 0.2;
                const t = clamp01((phaseTime - delay) / PHASE_DURATIONS.chunksTravel);
                chunkTravelProgress[i] = easeInOut(t);
            }
            if (phaseTime >= PHASE_DURATIONS.chunksTravel + (NUM_CHUNKS - 1) * 0.2) {
                phaseTime = 0; currentPhase = 'hold';
            }
            break;
        case 'hold':
            if (phaseTime >= PHASE_DURATIONS.hold) { phaseTime = 0; currentPhase = 'fadeOut'; }
            break;
        case 'fadeOut':
            globalAlpha = 1 - clamp01(phaseTime / PHASE_DURATIONS.fadeOut);
            if (phaseTime >= PHASE_DURATIONS.fadeOut) { phaseTime = 0; currentPhase = 'pause'; }
            break;
        case 'pause':
            globalAlpha = 0;
            if (phaseTime >= PHASE_DURATIONS.pause) { resetCycle(); }
            break;
    }
}

function drawFile() {
    if (currentPhase === 'pause') return;
    const phases = ['fileAppear', 'fileSplit'];
    let alpha = globalAlpha;
    if (currentPhase === 'fileAppear') {
        alpha *= easeOut(clamp01(phaseTime / PHASE_DURATIONS.fileAppear));
    }
    if (currentPhase === 'chunksTravel' || currentPhase === 'hold' || currentPhase === 'fadeOut') {
        // File stays visible but faded
        alpha *= 0.3;
    }
    if (currentPhase === 'fileSplit') {
        const t = clamp01(phaseTime / PHASE_DURATIONS.fileSplit);
        alpha *= (1 - t * 0.7);
    }
    ctx.globalAlpha = alpha;
    // Draw file icon larger
    shell(filePos.x, filePos.y, 44, 32);
    iconImage(filePos.x, filePos.y, 1);
    renderText('Upload', filePos.x, filePos.y + 50, WHITE, FONT, 'center', 'top');
    ctx.globalAlpha = 1;
}

function drawChunks() {
    if (currentPhase === 'fileAppear' || currentPhase === 'pause') return;

    for (let i = 0; i < NUM_CHUNKS; i++) {
        let cx, cy, alpha = globalAlpha;
        const cp = chunkPos(i);

        if (currentPhase === 'fileSplit') {
            const t = easeOut(clamp01((phaseTime - i * 0.1) / (PHASE_DURATIONS.fileSplit - 0.1 * NUM_CHUNKS)));
            cx = lerp(filePos.x, cp.x, t);
            cy = lerp(filePos.y, cp.y, t);
            alpha *= clamp01(t * 2);
        } else if (currentPhase === 'chunksTravel' && chunkStamped[i]) {
            const sp = stampedChunkPos(i);
            const node = storageNodes[chunkTargetNode[i]];
            const t = chunkTravelProgress[i];
            cx = lerp(sp.x, node.x, t);
            cy = lerp(sp.y, node.y, t);
            // Fade chunk as it arrives
            if (t > 0.85) alpha *= (1 - (t - 0.85) / 0.15);
        } else if (currentPhase === 'stampAttach' || currentPhase === 'stampBatchAppear') {
            cx = cp.x;
            cy = cp.y;
        } else if (currentPhase === 'chunksSettle') {
            cx = cp.x;
            cy = cp.y;
        } else if (currentPhase === 'hold' || currentPhase === 'fadeOut') {
            // Already at destination, faded out
            continue;
        } else {
            cx = cp.x;
            cy = cp.y;
        }

        ctx.globalAlpha = alpha;

        // Draw chunk circle
        const cr = 22, cir = 15;
        ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2);
        ctx.fillStyle = ORANGE; ctx.fill();
        ctx.strokeStyle = WHITE; ctx.lineWidth = STROKE_W; ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, cir, 0, Math.PI*2);
        ctx.fillStyle = DARK; ctx.fill();

        // Chunk hash label
        renderText(chunkHashes[i], cx, cy - 5, WHITE, 'bold 9px monospace', 'center', 'top');

        // Draw stamp on chunk if stamped
        if (chunkStamped[i] || (currentPhase === 'stampAttach' && i < stampIndex)) {
            iconStampFilled(cx + 18, cy - 14, 0.6);
        } else if (currentPhase === 'stampAttach' && i === stampIndex) {
            const perChunk = PHASE_DURATIONS.stampAttach + PHASE_DURATIONS.stampAttachGap;
            const localT = clamp01((phaseTime - i * perChunk) / PHASE_DURATIONS.stampAttach);
            const et = easeOut(localT);
            // Stamp flies in from the batch box area
            const sx = lerp(stampBatchBox.x + stampBatchBox.w / 2, cx + 18, et);
            const sy = lerp(stampBatchBox.y + stampBatchBox.h, cy - 14, et);
            const stampAlpha = clamp01(localT * 3);
            ctx.globalAlpha = alpha * stampAlpha;
            iconStampFilled(sx, sy, 0.6);
            ctx.globalAlpha = alpha;
        }

        ctx.globalAlpha = 1;
    }
}

function drawPostageBatch() {
    if (currentPhase === 'fileAppear' || currentPhase === 'fileSplit' || currentPhase === 'pause') return;

    let alpha = globalAlpha;
    if (currentPhase === 'chunksSettle') {
        alpha = 0; // not yet visible
        return;
    }
    if (currentPhase === 'stampBatchAppear') {
        alpha *= easeOut(clamp01(phaseTime / PHASE_DURATIONS.stampBatchAppear));
    }

    ctx.globalAlpha = alpha;
    const b = stampBatchBox;

    // Box background
    ctx.fillStyle = DARK;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = ORANGE; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.rect(b.x, b.y, b.w, b.h); ctx.stroke();

    // Title
    renderText('Postage Batch', b.x + b.w/2, b.y + 10, WHITE, 'bold 14px Arial, sans-serif', 'center', 'top');

    // Batch info
    renderText('Depth: 20', b.x + b.w/2, b.y + 30, 'rgba(255,255,255,0.8)', 'bold 13px monospace', 'center', 'top');
    renderText('Value: 10 BZZ', b.x + b.w/2, b.y + 48, 'rgba(255,255,255,0.8)', 'bold 13px monospace', 'center', 'top');

    // Stamp icon to the right of the box
    iconStamp(b.x + b.w + 28, b.y + b.h / 2, 1.2);

    ctx.globalAlpha = 1;
}

function drawConnectionLines() {
    if (currentPhase !== 'chunksTravel' && currentPhase !== 'hold') return;
    ctx.globalAlpha = globalAlpha * 0.3;
    for (let i = 0; i < NUM_CHUNKS; i++) {
        const sp = stampedChunkPos(i);
        const node = storageNodes[chunkTargetNode[i]];
        ctx.setLineDash([4, 4]);
        ln(sp.x, sp.y, node.x, node.y, WHITE, 1);
    }
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
}

function drawStorageNodes() {
    for (const node of storageNodes) {
        let alpha = globalAlpha;
        // Always visible but dim until chunks travel
        if (currentPhase === 'fileAppear' || currentPhase === 'fileSplit' || currentPhase === 'chunksSettle' ||
            currentPhase === 'stampBatchAppear' || currentPhase === 'stampAttach') {
            alpha *= 0.4;
        }
        ctx.globalAlpha = alpha;
        shell(node.x, node.y, 34, 24);
        iconHexDouble(node.x, node.y);
        renderText(node.label, node.x, node.y + 40, WHITE, 'bold 14px Arial, sans-serif', 'center', 'top');
        ctx.globalAlpha = 1;
    }
}

function drawLabels() {
    ctx.globalAlpha = globalAlpha;

    // Section labels
    if (currentPhase !== 'fileAppear' && currentPhase !== 'pause') {
        renderText('Chunks', chunkTargetX, chunkStartY - 45, WHITE, 'bold 15px Arial, sans-serif', 'center', 'top');
    }

    if (currentPhase === 'stampAttach' || currentPhase === 'stampBatchAppear') {
        renderText('Stamping', stampAreaX, chunkStartY - 45, 'rgba(255,255,255,0.6)', 'bold 15px Arial, sans-serif', 'center', 'top');
    }

    // Storage label
    renderText('Storage Network', 1070, 80, WHITE, 'bold 16px Arial, sans-serif', 'center', 'top');

    ctx.globalAlpha = 1;
}

// ── Header bar ──
function drawHeader() {
    ctx.fillStyle = ORANGE;
    ctx.fillRect(0, 0, W, 42);
    ctx.fillStyle = WHITE;
    ctx.font = 'italic bold 22px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Postage Stamps', W/2, 21);
}

function drawFooter() {
    ctx.globalAlpha = globalAlpha * 0.6;
    renderText(
        'Every chunk requires a postage stamp \u2014 proof of payment that funds its storage on the network.',
        W/2, H - 35,
        'rgba(255,255,255,0.6)', '15px Arial, sans-serif', 'center', 'top'
    );
    ctx.globalAlpha = 1;
}

// ── Main loop ──
let lastTime = 0;
function frame(ts) {
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    // 1. prerender
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    drawHeader();

    // Update
    updatePhase(dt);

    // 2. render — animated elements
    drawConnectionLines();
    drawChunks();

    // 3. postrender — static elements on top
    drawFile();
    drawPostageBatch();
    drawStorageNodes();
    drawLabels();
    drawFooter();

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
